name: Enterprise Deployment Pipeline

on:

  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:

  build:

    name: BUILD

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Application
        run: |
          echo "Building Application"
          echo "Build Successful"

  test:

    name: TEST

    runs-on: ubuntu-latest

    needs: build

    steps:

      - name: Run Tests
        run: |
          echo "Running Test Cases"
          echo "Tests Passed"

  deploy-dev:

    name: DEPLOY DEV

    runs-on: ubuntu-latest

    needs: test

    environment:
      name: DEV

    steps:

      - name: Deploy DEV
        run: |
          echo "Deploying to DEV"

  deploy-prod:

    name: DEPLOY PROD

    runs-on: ubuntu-latest

    needs: deploy-dev

    environment:
      name: PROD

    steps:

      - name: Deploy PROD
        run: |
          echo "Deploying to PROD"
